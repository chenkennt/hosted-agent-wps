# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: plain-streaming-agent
description: |
    Hosted invocations agent that streams Azure OpenAI chat responses directly over SSE.
metadata:
    tags:
        - AI Agent Hosting
        - Invocations Protocol
        - Bring Your Own
        - SSE
        - Python
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "1"
    memory: 2Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
    - name: CHAT_HISTORY_MAX_MESSAGES
      value: ${CHAT_HISTORY_MAX_MESSAGES}
